<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="512" height="512">
  <defs>
    <linearGradient id="purpleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d8b4fe" /> <!-- tailwind purple-300 -->
      <stop offset="100%" stop-color="#9333ea" /> <!-- tailwind purple-600 -->
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Dark minimal squircle background -->
  <rect width="24" height="24" rx="5" fill="#0f0f13" />
  
  <!-- Sleek purple droplet (car wash / water) -->
