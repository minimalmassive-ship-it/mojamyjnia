  <!-- Sparkles -->
  <path d="M18.5 7.5 Q 18.5 9.5, 20.5 9.5 Q 18.5 9.5, 18.5 11.5 Q 18.5 9.5, 16.5 9.5 Q 18.5 9.5, 18.5 7.5 Z" fill="#ffffff" opacity="0.9" filter="url(#glow)"/>
  <path d="M7 10 Q 7 11, 8 11 Q 7 11, 7 12 Q 7 11, 6 11 Q 7 11, 7 10 Z" fill="#ffffff" opacity="0.6" />
